server.port=8080
spring.application.name=TalentPredict

# Charge un fichier .env local (format clé=valeur) si présent à la racine backend/
spring.config.import=optional:file:.env[.properties]

# ===================================================================
# Configuration PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_academique
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# Configuration JPA/Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ===================================================================
# Configuration JWT
# ===================================================================
jwt.secret=${JWT_SECRET:TalentPredictSecretKeyForJWTAuthenticationMustBeLongEnough256Bits}
jwt.expiration=86400000

spring.security.user.name=admin
spring.security.user.password=admin123

spring.web.resources.static-locations=file:./uploads/,classpath:/static/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================================================================
# Paiements / Reçus
# ===================================================================
openrouter.api.key=${OPENROUTER_API_KEY:}
file.upload.path=uploads/receipts
file.max.size=5242880

# ===================================================================
# Configuration SMTP (Gmail)
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# URL frontend utilisée dans le lien de réinitialisation envoyé par email
app.reset-password-url=${APP_RESET_PASSWORD_URL:http://localhost:3000/reset-password}

# Variables à définir localement (App Password Google, pas le mot de passe Gmail)
spring.mail.username=${MAIL_USERNAME:gestionac.noreply@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}

# Fallback recipients for role-based notification emails (used when a notification has no explicit email)
app.notifications.enseignant.test-email=saifbenachour536@gmail.com
app.notifications.etudiant.test-email=saifbenachour539@gmail.com