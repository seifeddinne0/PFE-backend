erver.port=8081
spring.application.name=TalentPredict

# ===================================================================
# Configuration PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_academique
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# Configuration JPA/Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ===================================================================
# Configuration JWT
# ===================================================================
jwt.secret=${JWT_SECRET:TalentPredictSecretKeyForJWTAuthenticationMustBeLongEnough256Bits}
jwt.expiration=86400000

spring.security.user.name=admin
spring.security.user.password=admin123